<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0E1F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/hourglass.svg">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/styles.css">
  <title>Rule of the Day</title>
</head>
<body>
  <div id="app">
    <header id="header">
      <span id="heroTime" class="hero-time"></span>
      <button id="streakBadge" class="streak-badge" aria-label="Streak: 0 days. View history.">
        <span id="streakIcon" class="streak-icon" aria-hidden="true"></span>
        <span id="streakCount">0</span>
      </button>
    </header>

    <section id="anchorCards" class="anchor-cards" aria-label="Today's anchors">
      <div class="anchor-cards-scroll" id="anchorCardsScroll"></div>
    </section>

    <div id="degradedBanner" class="degraded-banner hidden" role="alert">
      <span id="degradedMessage">The day's been disrupted. Try a shorter version?</span>
      <div class="degraded-actions">
        <button id="degradedAccept" class="degraded-btn accept" aria-label="Accept shorter version">Accept 15 min</button>
        <button id="degradedDismiss" class="degraded-btn dismiss" aria-label="Keep full version">Full version</button>
      </div>
    </div>

    <div id="missTwiceNudge" class="miss-twice-nudge hidden" role="alert">
      <span id="missTwiceMessage">This slipped twice — shrink it to the two-minute version?</span>
      <div class="degraded-actions">
        <button id="missTwiceAccept" class="degraded-btn accept" aria-label="Use two-minute entry version">Use entry version</button>
        <button id="missTwiceDismiss" class="degraded-btn dismiss" aria-label="Keep current version">Keep full version</button>
      </div>
    </div>

    <main id="main">
      <div id="nowCard" class="now-card" role="region" aria-label="Current task" aria-live="polite">
        <div class="now-card-content">
          <span id="nowIdentity" class="now-identity hidden"></span>
          <span id="nowRole" class="now-role-tag"></span>
          <h2 id="nowTitle" class="now-title"></h2>
          <span id="nowStacked" class="now-stacked hidden"></span>
          <span id="nowEntry" class="now-entry hidden"></span>
          <div class="now-meta">
            <span id="nowDuration" class="caption"></span>
            <span id="nowUntil" class="caption"></span>
          </div>
          <div class="now-completed-msg hidden" id="nowCompleted">
            <span class="completed-check" aria-hidden="true"></span>
            <span class="completed-text">Completed</span>
          </div>
          <div id="nowActions" class="now-actions">
            <button id="markDone" class="btn primary" aria-label="Mark task as done">Mark Done</button>
            <button id="markEntry" class="btn entry hidden" aria-label="Complete with entry version">Or just: <span id="markEntryLabel"></span></button>
            <button id="holdTask" class="btn hold hidden" aria-label="Mark habit as held today">Held</button>
            <button id="slipTask" class="btn slip hidden" aria-label="Mark habit as slipped">Slipped</button>
            <button id="imBack" class="btn secondary" aria-label="Resume after disruption">I'm Back</button>
          </div>
        </div>
      </div>

      <div id="filterTabs" class="filter-tabs" role="tablist" aria-label="Filter by category"></div>

      <section id="queueSection">
        <ul id="queueList" class="queue-list" role="list" aria-label="Task queue"></ul>
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 4h12M6 20h12M6 4l6 8-6 8M18 4l-6 8 6 8"/>
            </svg>
          </div>
          <p class="body">Take a breath — nothing's on deck.</p>
        </div>
      </section>
    </main>

    <button id="fab" class="fab" aria-label="Import tasks">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <div id="quoteSplash" class="quote-splash hidden">
      <p class="quote-text"></p>
      <span class="quote-author"></span>
    </div>

    <div id="streakPanel" class="streak-panel hidden" role="dialog" aria-label="Streak and score">
      <h3 class="section-heading">Streak &amp; Score</h3>
      <div class="streak-summary">
        <span>Score: <strong id="scoreDisplay">0</strong></span>
      </div>
      <h4 class="section-heading" style="font-size:var(--caption);margin-top:4px">Last 7 Days</h4>
      <div id="streakHistory" class="streak-history"></div>
      <button id="streakClose" class="btn ghost" aria-label="Close streak panel">Close</button>
    </div>

    <div id="overlay" class="overlay hidden" aria-hidden="true"></div>

    <div id="importSheet" class="import-sheet hidden" role="dialog" aria-label="Import tasks">
      <h3 class="section-heading">Import Tasks</h3>
      <p class="caption sheet-hint">Paste the JSON Claude gave you.</p>
      <textarea id="importInput" class="import-input" rows="6" placeholder='[{"title": "...", "role": "deep", "type": "build", "durationMinutes": 45, "priority": 1}]' aria-label="Paste task JSON here"></textarea>
      <div id="importError" class="import-error hidden" role="alert"></div>
      <button id="importSubmit" class="btn primary full" aria-label="Merge tasks into queue">Merge In</button>
      <button id="importCancel" class="btn ghost full" aria-label="Cancel import">Cancel</button>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
